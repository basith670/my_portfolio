<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Page Not Found</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f8fafc;
}

.container{
    text-align:center;
}

h1{
    font-size:7rem;
    color:#2563eb;
}

p{
    font-size:1.2rem;
    color:#475569;
    margin:20px 0;
}

a{
    display:inline-block;
    margin-top:15px;
    padding:14px 30px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

a:hover{
    background:#1d4ed8;
}
</style>

</head>

<body>

<div class="container">

<h1>404</h1>

<p>Oops! The page you're looking for doesn't exist.</p>

<a href="/">Go Home</a>

</div>

</body>
</html>
